name: browserstack

# Real-browser E2E via BrowserStack Automate (Selenium). Verifies that the
# legacy chunks + polyfills actually hydrate the playground in Chrome 49/61/91.
# Kept separate from ci.yml because it depends on an external service and
# consumes limited parallel sessions; continue-on-error means it never blocks
# merge.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  legacy-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7.0.0

      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
      - name: Upgrade corepack
        run: npm i -g corepack@latest

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Prepare module + playgrounds
        run: npm run dev:prepare

      - name: Run BrowserStack Automate E2E
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run test:e2e
