catalogMode: prefer
cleanupUnusedCatalogs: true
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1

packages:
  - ./
  - playgrounds/*

patchedDependencies:
  event-target-shim@6.0.2: patches/event-target-shim@6.0.2.patch

catalogs:
  dev:
    '@antfu/eslint-config': ^9.0.0
    '@nuxt/devtools': 3.2.4
    '@nuxt/eslint-config': ^1.16.0
    '@nuxt/module-builder': ^1.0.2
    '@nuxt/schema': ^4.4.8
    '@nuxt/test-utils': ^4.0.3
    '@types/node': ^24.13.1
    '@vitejs/plugin-legacy': ^7.2.1
    changelogen: ^0.6.2
    changelogithub: ^14.0.0
    eslint: ^10.4.1
    node-html-parser: ^7.1.0
    nuxt: ^4.4.4
    typescript: ~6.0.3
    vitest: ^4.1.8
    vue-tsc: ^3.3.4
  dev:nuxt-v3:
    # eslint-disable-next-line pnpm/yaml-no-duplicate-catalog-item
    nuxt: ^3.21.4
  polyfills:
    event-target-shim: ^6.0.2
  prod:
    '@nuxt/kit': ^4.4.8

ignoredBuiltDependencies:
  - core-js
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
