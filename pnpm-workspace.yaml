catalogMode: prefer
cleanupUnusedCatalogs: true
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1

packages:
  - ./
  - playgrounds/*

patchedDependencies:
  event-target-shim@6.0.2: patches/event-target-shim@6.0.2.patch

catalogs:
  dev:
    '@antfu/eslint-config': ^7.7.2
    '@nuxt/devtools': 3.2.3
    '@nuxt/eslint-config': ^1.15.2
    '@nuxt/module-builder': ^1.0.2
    '@nuxt/schema': ^4.4.2
    '@nuxt/test-utils': ^4.0.0
    '@types/node': ^24.12.0
    '@vitejs/plugin-legacy': ^8.0.0
    changelogen: ^0.6.2
    changelogithub: ^14.0.0
    eslint: ^10.0.3
    node-html-parser: ^7.1.0
    nuxt: ^4.4.2
    typescript: ~6.0.2
    vitest: ^4.1.0
    vue-tsc: ^3.2.5
  dev:nuxt-v3:
    # eslint-disable-next-line pnpm/yaml-no-duplicate-catalog-item
    nuxt: ^3.21.2
  polyfills:
    event-target-shim: ^6.0.2
  prod:
    '@nuxt/kit': ^4.4.2

ignoredBuiltDependencies:
  - core-js
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
